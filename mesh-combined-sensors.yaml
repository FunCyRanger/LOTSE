# LOTSE Mesh — Combined Neighborhood Sensors
#
# Aggregates all neighbor data into single sensors for monitoring and the
# Energy Dashboard. New neighbors are auto-included via regex patterns.
#
# Installation: see ha-setup.md Step 3.
#
# After install, search "Combined Mesh" in Settings → Devices & Services → Entities.
# For a single-page view, import lotse-dashboard.yaml (see ha-setup.md Step 3).

template: !include mesh-combined-template.yaml

sensor:
  - platform: statistics
    name: "Solar Power Std Dev"
    unique_id: "solar_power_std_dev"
    entity_id: sensor.combined_mesh_sp
    state_characteristic: standard_deviation
    max_age:
      minutes: 15
    sampling_size: 100

  - platform: statistics
    name: "Solar Power Mean"
    unique_id: "solar_power_mean"
    entity_id: sensor.combined_mesh_sp
    state_characteristic: average_linear
    max_age:
      minutes: 15
    sampling_size: 100
