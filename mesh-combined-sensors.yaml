# LOTSE Mesh — Combined Neighborhood Sensors
#
# Aggregates all neighbor data into single sensors for monitoring and the
# Energy Dashboard. New neighbors are auto-included via regex patterns.
#
# Installation: see ha-setup.md Step 3, or add to HA configuration.yaml:
#   template: !include mesh-combined-sensors.yaml
# (the packages/ folder method also works if you have packages configured).
#
# After install, search "Combined Mesh" in Settings → Devices & Services → Entities.
# For a single-page view, import lotse-dashboard.yaml (see ha-setup.md Step 3).

template:
  - sensor:

      # --- Grid Power ---
      - name: "Combined Mesh Grid Power"
        unique_id: "combined_mesh_gp"
        unit_of_measurement: "kW"
        device_class: "power"
        state_class: "measurement"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_gp$') | list %}
          {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

      - name: "Combined Mesh Grid Import Power"
        unique_id: "combined_mesh_gip"
        unit_of_measurement: "kW"
        device_class: "power"
        state_class: "measurement"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_gip$') | list %}
          {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

      - name: "Combined Mesh Grid Export Power"
        unique_id: "combined_mesh_gep"
        unit_of_measurement: "kW"
        device_class: "power"
        state_class: "measurement"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_gep$') | list %}
          {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

      # --- Solar Power ---
      - name: "Combined Mesh Solar Power"
        unique_id: "combined_mesh_sp"
        unit_of_measurement: "kW"
        device_class: "power"
        state_class: "measurement"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_sp$') | list %}
          {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

      # --- Battery ---
      - name: "Average Neighbor SOC"
        unique_id: "avg_neighbor_soc"
        unit_of_measurement: "%"
        device_class: "battery"
        state_class: "measurement"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_bs$') | list %}
          {% set vals = entities | map(attribute='state') | map('int', 0) | list %}
          {{ (vals | sum / vals | length) | round(0) if vals | length > 0 else 0 }}

      # --- Grid Cumulative Energy (for Energy Dashboard) ---
      - name: "Combined Mesh Grid Import"
        unique_id: "combined_mesh_gei"
        unit_of_measurement: "kWh"
        device_class: "energy"
        state_class: "total_increasing"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_gei$') | list %}
          {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

      - name: "Combined Mesh Grid Export"
        unique_id: "combined_mesh_geo"
        unit_of_measurement: "kWh"
        device_class: "energy"
        state_class: "total_increasing"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_geo$') | list %}
          {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

      - name: "Combined Mesh Solar Energy"
        unique_id: "combined_mesh_se"
        unit_of_measurement: "kWh"
        device_class: "energy"
        state_class: "total_increasing"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_se$') | list %}
          {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

      # --- Derived neighborhood sensors ---

      - name: "Combined Mesh Total Solar Generation"
        unique_id: "combined_mesh_solar_total"
        unit_of_measurement: "kW"
        device_class: "power"
        state_class: "measurement"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_sp$') | list %}
          {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

      - name: "Combined Self-Consumption Rate"
        unique_id: "combined_self_consumption"
        unit_of_measurement: "%"
        state_class: "measurement"
        state: >
          {% set solar = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_sp$')
             | map(attribute='state') | map('float', 0) | sum %}
          {% set export = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_gep$')
             | map(attribute='state') | map('float', 0) | sum %}
          {{ [((1 - export / solar) * 100), 0] | max | round(1) if solar > 0 else 0 }}

      - name: "Participating Neighbors"
        unique_id: "combined_mesh_node_count"
        unit_of_measurement: "nodes"
        state_class: "measurement"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_gip$') | list %}
          {{ entities | length }}

      # --- Config-derived sensors (from bC, sK, sA, sZ) ---

      - name: "Weighted Average SOC"
        unique_id: "weighted_avg_soc"
        unit_of_measurement: "%"
        device_class: "battery"
        state_class: "measurement"
        state: >
          {% set bs_nodes = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_bs$') | list %}
          {% set ns = namespace(weighted_sum=0, total_cap=0) %}
          {% for node in bs_nodes %}
            {% set nid = node.entity_id
               | regex_replace(find='^sensor\\.node_(\\d+)_bs$', replace='\\1', ignorecase=False) %}
            {% set cap = states('sensor.node_' ~ nid ~ '_bc') | float(0) %}
            {% set soc = node.state | int(0) %}
            {% if cap > 0 %}
              {% set ns.weighted_sum = ns.weighted_sum + soc * cap %}
              {% set ns.total_cap = ns.total_cap + cap %}
            {% endif %}
          {% endfor %}
          {% if ns.total_cap > 0 %}
            {{ (ns.weighted_sum / ns.total_cap) | round(0) }}
          {% elif bs_nodes | length > 0 %}
            {{ (bs_nodes | map(attribute='state') | map('int', 0) | sum / bs_nodes | length) | round(0) }}
          {% else %}
            0
          {% endif %}

      - name: "Combined Mesh Battery Capacity"
        unique_id: "combined_mesh_battery_capacity"
        unit_of_measurement: "kWh"
        state_class: "measurement"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_bc$') | list %}
          {{ entities | map(attribute='state') | map('float', 0) | sum | round(1) }}

      - name: "Combined Mesh Solar Capacity"
        unique_id: "combined_mesh_solar_capacity"
        unit_of_measurement: "kW"
        device_class: "power"
        state_class: "measurement"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_sk$') | list %}
          {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

      - name: "Combined Solar Utilization"
        unique_id: "combined_solar_utilization"
        unit_of_measurement: "%"
        state_class: "measurement"
        state: >
          {% set sp = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_sp$')
             | map(attribute='state') | map('float', 0) | sum %}
          {% set sk = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_sk$')
             | map(attribute='state') | map('float', 0) | sum %}
          {{ ((sp / sk) * 100) | round(1) if sk > 0 else 0 }}

      - name: "Config-Ready Nodes"
        unique_id: "combined_mesh_config_ready"
        unit_of_measurement: "nodes"
        state_class: "measurement"
        state: >
          {% set entities = expand(states.sensor)
             | selectattr('entity_id', 'search', 'node_\\d+_bc$') | list %}
          {{ entities | length }}

      # --- Forecast.Solar: weighted combined plane ---

      - name: "Combined Solar Panel Angle"
        unique_id: "combined_solar_panel_angle"
        unit_of_measurement: "°"
        state_class: "measurement"
        state: >
          {% set ns = namespace(total_kwp=0, weighted=0) %}
          {% for s in expand(states.sensor) | selectattr('entity_id', 'search', 'node_\\d+_sk$') %}
            {% set kwp = s.state | float(0) %}
            {% if kwp > 0 %}
              {% set nid = s.entity_id
                 | regex_replace(find='^sensor\\.node_(\\d+)_sk$', replace='\\1', ignorecase=False) %}
              {% set ang = states('sensor.node_' ~ nid ~ '_sa') | float(0) %}
              {% set ns.weighted = ns.weighted + kwp * ang %}
              {% set ns.total_kwp = ns.total_kwp + kwp %}
            {% endif %}
          {% endfor %}
          {{ (ns.weighted / ns.total_kwp) | round(1) if ns.total_kwp > 0 else 0 }}

      - name: "Combined Solar Panel Azimuth"
        unique_id: "combined_solar_panel_azimuth"
        unit_of_measurement: "°"
        state_class: "measurement"
        state: >
          {% set ns = namespace(total_kwp=0, weighted=0) %}
          {% for s in expand(states.sensor) | selectattr('entity_id', 'search', 'node_\\d+_sk$') %}
            {% set kwp = s.state | float(0) %}
            {% if kwp > 0 %}
              {% set nid = s.entity_id
                 | regex_replace(find='^sensor\\.node_(\\d+)_sk$', replace='\\1', ignorecase=False) %}
              {% set az = states('sensor.node_' ~ nid ~ '_sz') | float(0) %}
              {% set ns.weighted = ns.weighted + kwp * az %}
              {% set ns.total_kwp = ns.total_kwp + kwp %}
            {% endif %}
          {% endfor %}
          {{ (ns.weighted / ns.total_kwp) | round(1) if ns.total_kwp > 0 else 0 }}

      - name: "Solar Forecast Utilization"
        unique_id: "solar_forecast_utilization"
        unit_of_measurement: "%"
        state_class: "measurement"
        state: >
          {% set actual = states('sensor.combined_mesh_se') | float(0) %}
          {% set forecast = states('sensor.solar_forecast_today') | float(0) %}
          {{ (actual / forecast * 100) | round(1) if forecast > 0 else 0 }}

      # Energy Dashboard solar production sensor with forecast attribute.
      # State tracks actual cumulative production; forecast attribute is built
      # from the hourly REST data below.
      - name: "Solar Production with Forecast"
        unique_id: "solar_production_forecast"
        device_class: "energy"
        state_class: "total_increasing"
        unit_of_measurement: "kWh"
        state: >
          {{ states('sensor.combined_mesh_se') | float(0) | round(2) }}
        attributes:
          forecast: >
            {% set raw = states('sensor.solar_forecast_hourly_raw') %}
            {% set wh = raw | from_json if raw not in ('unknown', 'unavailable', 'none', '') else none %}
            {% if wh %}
              {% set tz = now().strftime('%z') %}
              {% set tz_s = tz[:3] + ':' + tz[3:] if tz else '+00:00' %}
              [
              {% for ts, val in wh.items() %}
                {"time": "{{ ts | replace(' ', 'T') }}{{ tz_s }}", "wh_hours": {{ val | int }}}
                {% if not loop.last %},{% endif %}
              {% endfor %}
              ]
            {% else %}
              []
            {% endif %}

rest:
  # Hourly data (includes watt_hours_day + per-period watt_hours).
  # The `result` attribute holds the full API response for the forecast template above.
  - resource_template: >
      https://api.forecast.solar/estimate/watthours/
      {{ state_attr('zone.home', 'latitude') | string | truncate(7, true, '') }}/
      {{ state_attr('zone.home', 'longitude') | string | truncate(7, true, '') }}/
      {{ states('sensor.combined_solar_panel_angle') | float(0) | int }}/
      {% set ha_az = states('sensor.combined_solar_panel_azimuth') | float(0) %}
      {{ (ha_az - 180) | int }}/
      {{ states('sensor.combined_mesh_solar_capacity') | float(0) }}
    scan_interval: 3600
    sensor:
      - name: "Solar Forecast Today"
        unique_id: "solar_forecast_today"
        unit_of_measurement: "kWh"
        device_class: "energy"
        state_class: "measurement"
        value_template: >
          {% set wh = value_json.result.watt_hours_day.values() | first | default(0) %}
          {{ (wh / 1000) | round(1) }}
      - name: "Solar Forecast Tomorrow"
        unique_id: "solar_forecast_tomorrow"
        unit_of_measurement: "kWh"
        device_class: "energy"
        state_class: "measurement"
        value_template: >
          {% set vals = value_json.result.watt_hours_day.values() | list %}
          {{ (vals[1] / 1000) | round(1) if vals | length > 1 else 0 }}
      - name: "Solar Forecast Hourly Raw"
        unique_id: "solar_forecast_hourly_raw"
        value_template: >
          {{ value_json.result.watt_hours | to_json }}
