- resource_template: >-
    https://api.forecast.solar/estimate/watthours/{{ state_attr('zone.home', 'latitude') | string | truncate(7, true, '') }}/{{ state_attr('zone.home', 'longitude') | string | truncate(7, true, '') }}/{{ states('sensor.combined_solar_panel_angle') | float(0) | int }}/{% set ha_az = states('sensor.combined_solar_panel_azimuth') | float(0) %}{{ (ha_az - 180) | int }}/{{ states('sensor.combined_mesh_solar_capacity') | float(0) }}
  scan_interval: 600
  sensor:
    - name: "Solar Forecast Today"
      unique_id: "solar_forecast_today"
      unit_of_measurement: "kWh"
      device_class: "energy"
      state_class: "total"
      value_template: >
        {% if value_json is defined and value_json.result is defined %}
          {% set today = now().strftime('%Y-%m-%d') %}
          {% set ns = namespace(max=0) %}
          {% for ts, val in value_json.result.items() if ts.startswith(today) %}
            {% if val | int > ns.max %}{% set ns.max = val | int %}{% endif %}
          {% endfor %}
          {{ (ns.max / 1000) | round(1) }}
        {% else %}
          0
        {% endif %}
    - name: "Solar Forecast Tomorrow"
      unique_id: "solar_forecast_tomorrow"
      unit_of_measurement: "kWh"
      device_class: "energy"
      state_class: "total"
      value_template: >
        {% if value_json is defined and value_json.result is defined %}
          {% set tomorrow = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
          {% set ns = namespace(max=0) %}
          {% for ts, val in value_json.result.items() if ts.startswith(tomorrow) %}
            {% if val | int > ns.max %}{% set ns.max = val | int %}{% endif %}
          {% endfor %}
          {{ (ns.max / 1000) | round(1) }}
        {% else %}
          0
        {% endif %}
    - name: "Solar Forecast Hourly Raw"
      unique_id: "solar_forecast_hourly_raw"
      json_attributes:
        - "result"
      value_template: >
        {% if value_json is defined and value_json.result is defined %}
          {{ value_json.result.keys() | first | default('none') }}
        {% else %}
          none
        {% endif %}
