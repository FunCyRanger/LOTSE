blueprint:
  name: LOTSE Mesh — Send Meter Data to LoRa
  description: >
    Periodically publish your household's meter readings into the LoRa mesh
    via MQTT downlink to a Heltec V3 node. Only sensors you select will be
    included in the payload — delete unused entity selectors or leave them empty.
    Also publishes node registration (battery capacity, solar specs) on startup
    and once daily as a separate message.
  domain: automation
  source_url: >
    https://github.com/FunCyRanger/LOTSE/blob/main/sender-blueprint.yaml
  input:
    node_decimal:
      name: Node Number
      description: >
        Your Heltec V3's decimal node number (Meshtastic Web UI > About page)
      selector:
        text:
    region:
      name: LoRa Region
      description: Region code (e.g. EU_868, US_915)
      default: EU_868
      selector:
        text:
    interval:
      name: Send Interval (minutes)
      description: How often to publish measurement data (in minutes)
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: minutes
    channel:
      name: MQTT Channel
      description: Channel index for the mqtt downlink (0=LongFast, 1=first non-primary)
      default: 1
      selector:
        number:
          min: 0
          max: 7
    # --- Grid ---
    gP_entity:
      name: Grid Net Power (gP)
      description: Signed net power in kW (+import, -export)
      default: ""
      selector:
        entity:
          domain: sensor
    gIP_entity:
      name: Grid Import Power (gIP)
      description: Import power in kW (always ≥0)
      selector:
        entity:
          domain: sensor
    gEP_entity:
      name: Grid Export Power (gEP)
      description: Export power in kW (always ≥0)
      default: ""
      selector:
        entity:
          domain: sensor
    gP1_entity:
      name: Phase 1 Power (gP1)
      description: Phase 1 power in kW
      default: ""
      selector:
        entity:
          domain: sensor
    gP2_entity:
      name: Phase 2 Power (gP2)
      description: Phase 2 power in kW
      default: ""
      selector:
        entity:
          domain: sensor
    gP3_entity:
      name: Phase 3 Power (gP3)
      description: Phase 3 power in kW
      default: ""
      selector:
        entity:
          domain: sensor
    gV1_entity:
      name: Phase 1 Voltage (gV1)
      description: Phase 1 voltage in V
      default: ""
      selector:
        entity:
          domain: sensor
    gV2_entity:
      name: Phase 2 Voltage (gV2)
      description: Phase 2 voltage in V
      default: ""
      selector:
        entity:
          domain: sensor
    gV3_entity:
      name: Phase 3 Voltage (gV3)
      description: Phase 3 voltage in V
      default: ""
      selector:
        entity:
          domain: sensor
    gEI_entity:
      name: Grid Energy Import (gEI)
      description: Cumulative energy import in kWh
      default: ""
      selector:
        entity:
          domain: sensor
    gEO_entity:
      name: Grid Energy Export (gEO)
      description: Cumulative energy export in kWh
      default: ""
      selector:
        entity:
          domain: sensor
    # --- Solar ---
    sP_entity:
      name: Solar Power (sP)
      description: Solar power in kW
      default: ""
      selector:
        entity:
          domain: sensor
    sE_entity:
      name: Solar Energy (sE)
      description: Solar cumulative energy in kWh
      default: ""
      selector:
        entity:
          domain: sensor
    # --- Battery ---
    bP_entity:
      name: Battery Power (bP)
      description: Battery power in kW (+charge, -discharge)
      default: ""
      selector:
        entity:
          domain: sensor
    bS_entity:
      name: Battery State of Charge (bS)
      description: Battery state of charge in %
      default: ""
      selector:
        entity:
          domain: sensor
    bEI_entity:
      name: Battery Energy In (bEI)
      description: Cumulative energy into battery in kWh
      default: ""
      selector:
        entity:
          domain: sensor
    bEO_entity:
      name: Battery Energy Out (bEO)
      description: Cumulative energy out of battery in kWh
      default: ""
      selector:
        entity:
          domain: sensor
    # --- Wallbox ---
    wP_entity:
      name: Wallbox Power (wP)
      description: Wallbox power in kW
      default: ""
      selector:
        entity:
          domain: sensor
    wE_entity:
      name: Wallbox Energy (wE)
      description: Wallbox cumulative energy in kWh
      default: ""
      selector:
        entity:
          domain: sensor
    wS_entity:
      name: Wallbox State of Charge (wS)
      description: Wallbox state of charge in %
      default: ""
      selector:
        entity:
          domain: sensor
    # --- Node Registration (optional) ---
    config_hour:
      name: Daily Re-registration Hour
      description: Hour of day (0-23) to re-send node registration
      default: 3
      selector:
        number:
          min: 0
          max: 23
    battery_capacity:
      name: Battery Capacity (kWh)
      description: Total battery capacity in kWh (e.g. 10.0)
      default: ""
      selector:
        number:
          min: 0
          max: 1000
          mode: box
          unit_of_measurement: kWh
    solar_peak:
      name: Solar Peak Power (kWp)
      description: Total installed solar peak power in kWp (e.g. 5.0)
      default: ""
      selector:
        number:
          min: 0
          max: 100
          mode: box
          unit_of_measurement: kWp
    panel_angle:
      name: Panel Angle (°)
      description: Solar panel tilt angle from horizontal (0-90)
      default: ""
      selector:
        number:
          min: 0
          max: 90
          mode: box
          unit_of_measurement: "°"
    panel_azimuth:
      name: Panel Azimuth (°)
      description: Solar panel orientation from north (0-360)
      default: ""
      selector:
        number:
          min: 0
          max: 360
          mode: box
          unit_of_measurement: "°"
    config_trigger:
      name: Force Config Resend
      description: >
        Optional input_boolean helper. Toggle ON to immediately re-send
        the config envelope (panel specs, battery capacity) to the mesh.
        Leave empty if not needed.
      default: ""
      selector:
        entity:
          domain: input_boolean

trigger_variables:
  interval: !input interval
  config_hour: !input config_hour
  config_trigger: !input config_trigger
trigger:
  - platform: homeassistant
    event: start
    id: boot
  - platform: time_pattern
    minutes: "/1"
    id: tick
  - platform: state
    entity_id: !input config_trigger
    id: config_requested

action:
  - variables:
      node: !input node_decimal
      region: !input region
      channel_input: !input channel
      # Measurement vars
      gP: !input gP_entity
      gIP: !input gIP_entity
      gEP: !input gEP_entity
      gP1: !input gP1_entity
      gP2: !input gP2_entity
      gP3: !input gP3_entity
      gV1: !input gV1_entity
      gV2: !input gV2_entity
      gV3: !input gV3_entity
      gEI: !input gEI_entity
      gEO: !input gEO_entity
      sP: !input sP_entity
      sE: !input sE_entity
      bP: !input bP_entity
      bS: !input bS_entity
      bEI: !input bEI_entity
      bEO: !input bEO_entity
      wP: !input wP_entity
      wE: !input wE_entity
      wS: !input wS_entity
      # Config vars
      cap: !input battery_capacity
      pv: !input solar_peak
      ang: !input panel_angle
      az: !input panel_azimuth
  # --- Config section: on first run and daily at config_hour ---
  - if:
      - condition: template
        value_template: >
          {{ trigger.id == 'boot'
             or trigger.id == 'config_requested'
             or (now().minute % (interval | int) == 0
                 and now().hour == (config_hour | int)) }}
    then:
      - variables:
          config_payload: >
            {% set items = [] %}
            {% if cap | string != '' %}
              {% set items = items + [("bC", cap | float)] %}
            {% endif %}
            {% if pv | string != '' %}
              {% set items = items + [("sK", pv | float)] %}
            {% endif %}
            {% if ang | string != '' %}
              {% set items = items + [("sA", ang | int)] %}
            {% endif %}
            {% if az | string != '' %}
              {% set items = items + [("sZ", az | int)] %}
            {% endif %}
            {% set inner = dict(items) | to_json %}
            {% if items | length > 0 %}
              {% set outer_env = {"from": node|int(0), "type": "sendtext", "payload": inner, "channel": channel_input|int(0)} %}
              {{ outer_env | to_json }}
            {% endif %}
      - condition: template
        value_template: "{{ config_payload | string != '' }}"
      - delay: "{{ range(0, 60) | random }}"
      - service: mqtt.publish
        data:
          qos: 0
          retain: true
          evaluate_payload: false
          topic: "msh/{{ region }}/2/json/mqtt/{{ node }}"
          payload: "{{ config_payload }}"
      # --- Direct config value publishes (retained, for receiver persistence) ---
      - if:
          - condition: template
            value_template: "{{ cap | string != '' }}"
        then:
          - service: mqtt.publish
            data:
              qos: 0
              retain: true
              evaluate_payload: false
              topic: "lotse/config/{{ node }}/bc"
              payload: "{{ cap | float | round(2) }}"
      - if:
          - condition: template
            value_template: "{{ pv | string != '' }}"
        then:
          - service: mqtt.publish
            data:
              qos: 0
              retain: true
              evaluate_payload: false
              topic: "lotse/config/{{ node }}/sk"
              payload: "{{ pv | float | round(2) }}"
      - if:
          - condition: template
            value_template: "{{ ang | string != '' }}"
        then:
          - service: mqtt.publish
            data:
              qos: 0
              retain: true
              evaluate_payload: false
              topic: "lotse/config/{{ node }}/sa"
              payload: "{{ ang | int }}"
      - if:
          - condition: template
            value_template: "{{ az | string != '' }}"
        then:
          - service: mqtt.publish
            data:
              qos: 0
              retain: true
              evaluate_payload: false
              topic: "lotse/config/{{ node }}/sz"
              payload: "{{ az | int }}"
  # --- Measurement section: every interval (existing behavior) ---
  - if:
      - condition: template
        value_template: "{{ now().minute % (interval | int) == 0 }}"
    then:
      - variables:
          envelope: >
            {% set kW = {'w': 0.001, 'kw': 1, 'mw': 1000} %}
            {% set kWh = {'wh': 0.001, 'kwh': 1, 'mwh': 1000} %}
            {% set V_dict = {'mv': 0.001, 'v': 1, 'kv': 1000} %}
            {% set bad = ('unavailable','unknown','none','NaN','nan','inf','-inf') %}
            {% set energy_units = ('wh','kwh','mwh') %}
            {% set items = [] %}
            {% if gP %}{% set uo=(state_attr(gP,'unit_of_measurement') or '').lower() %}{% if states(gP)not in bad and uo not in energy_units %}{% set v=(states(gP)|float(0)*kW.get(uo,1))|round(2) %}{% set items=items+[("gP",[[v,500]|min,-500]|max)] %}{% endif %}{% endif %}
            {% if gIP %}{% set uo=(state_attr(gIP,'unit_of_measurement') or '').lower() %}{% if states(gIP)not in bad and uo not in energy_units %}{% set v=(states(gIP)|float(0)*kW.get(uo,1))|round(2) %}{% set items=items+[("gIP",[[v,500]|min,0]|max)] %}{% endif %}{% endif %}
            {% if gEP %}{% set uo=(state_attr(gEP,'unit_of_measurement') or '').lower() %}{% if states(gEP)not in bad and uo not in energy_units %}{% set v=(states(gEP)|float(0)*kW.get(uo,1))|round(2) %}{% set items=items+[("gEP",[[v,500]|min,0]|max)] %}{% endif %}{% endif %}
            {% if gP1 %}{% set uo=(state_attr(gP1,'unit_of_measurement') or '').lower() %}{% if states(gP1)not in bad and uo not in energy_units %}{% set v=(states(gP1)|float(0)*kW.get(uo,1))|round(2) %}{% set items=items+[("gP1",[[v,500]|min,-500]|max)] %}{% endif %}{% endif %}
            {% if gP2 %}{% set uo=(state_attr(gP2,'unit_of_measurement') or '').lower() %}{% if states(gP2)not in bad and uo not in energy_units %}{% set v=(states(gP2)|float(0)*kW.get(uo,1))|round(2) %}{% set items=items+[("gP2",[[v,500]|min,-500]|max)] %}{% endif %}{% endif %}
            {% if gP3 %}{% set uo=(state_attr(gP3,'unit_of_measurement') or '').lower() %}{% if states(gP3)not in bad and uo not in energy_units %}{% set v=(states(gP3)|float(0)*kW.get(uo,1))|round(2) %}{% set items=items+[("gP3",[[v,500]|min,-500]|max)] %}{% endif %}{% endif %}
            {% if gV1 %}{% set uo=(state_attr(gV1,'unit_of_measurement') or '').lower() %}{% if states(gV1)not in bad %}{% set items=items+[("gV1",(states(gV1)|float(0)*V_dict.get(uo,1))|round(1))] %}{% endif %}{% endif %}
            {% if gV2 %}{% set uo=(state_attr(gV2,'unit_of_measurement') or '').lower() %}{% if states(gV2)not in bad %}{% set items=items+[("gV2",(states(gV2)|float(0)*V_dict.get(uo,1))|round(1))] %}{% endif %}{% endif %}
            {% if gV3 %}{% set uo=(state_attr(gV3,'unit_of_measurement') or '').lower() %}{% if states(gV3)not in bad %}{% set items=items+[("gV3",(states(gV3)|float(0)*V_dict.get(uo,1))|round(1))] %}{% endif %}{% endif %}
            {% if gEI %}{% set uo=(state_attr(gEI,'unit_of_measurement') or '').lower() %}{% if states(gEI)not in bad and uo not in ('w','kw','mw') %}{% set v=(states(gEI)|float(0)*kWh.get(uo,1))|round(2) %}{% set items=items+[("gEI",[v,0]|max)] %}{% endif %}{% endif %}
            {% if gEO %}{% set uo=(state_attr(gEO,'unit_of_measurement') or '').lower() %}{% if states(gEO)not in bad and uo not in ('w','kw','mw') %}{% set v=(states(gEO)|float(0)*kWh.get(uo,1))|round(2) %}{% set items=items+[("gEO",[v,0]|max)] %}{% endif %}{% endif %}
            {% if sP %}{% set uo=(state_attr(sP,'unit_of_measurement') or '').lower() %}{% if states(sP)not in bad and uo not in energy_units %}{% set v=(states(sP)|float(0)*kW.get(uo,1))|round(2) %}{% set items=items+[("sP",[[v,500]|min,-500]|max)] %}{% endif %}{% endif %}
            {% if sE %}{% set uo=(state_attr(sE,'unit_of_measurement') or '').lower() %}{% if states(sE)not in bad and uo not in ('w','kw','mw') %}{% set v=(states(sE)|float(0)*kWh.get(uo,1))|round(2) %}{% set items=items+[("sE",[v,0]|max)] %}{% endif %}{% endif %}
            {% if bP %}{% set uo=(state_attr(bP,'unit_of_measurement') or '').lower() %}{% if states(bP)not in bad and uo not in energy_units %}{% set v=(states(bP)|float(0)*kW.get(uo,1))|round(2) %}{% set items=items+[("bP",[[v,500]|min,-500]|max)] %}{% endif %}{% endif %}
            {% if bS and states(bS) not in bad %}{% set v=states(bS)|int(0) %}{% set items=items+[("bS",[[v,100]|min,0]|max)] %}{% endif %}
            {% if bEI %}{% set uo=(state_attr(bEI,'unit_of_measurement') or '').lower() %}{% if states(bEI)not in bad and uo not in ('w','kw','mw') %}{% set v=(states(bEI)|float(0)*kWh.get(uo,1))|round(2) %}{% set items=items+[("bEI",[v,0]|max)] %}{% endif %}{% endif %}
            {% if bEO %}{% set uo=(state_attr(bEO,'unit_of_measurement') or '').lower() %}{% if states(bEO)not in bad and uo not in ('w','kw','mw') %}{% set v=(states(bEO)|float(0)*kWh.get(uo,1))|round(2) %}{% set items=items+[("bEO",[v,0]|max)] %}{% endif %}{% endif %}
            {% if wP %}{% set uo=(state_attr(wP,'unit_of_measurement') or '').lower() %}{% if states(wP)not in bad and uo not in energy_units %}{% set v=(states(wP)|float(0)*kW.get(uo,1))|round(2) %}{% set items=items+[("wP",[[v,500]|min,-500]|max)] %}{% endif %}{% endif %}
            {% if wE %}{% set uo=(state_attr(wE,'unit_of_measurement') or '').lower() %}{% if states(wE)not in bad and uo not in ('w','kw','mw') %}{% set v=(states(wE)|float(0)*kWh.get(uo,1))|round(2) %}{% set items=items+[("wE",[v,0]|max)] %}{% endif %}{% endif %}
            {% if wS and states(wS) not in bad %}{% set v=states(wS)|int(0) %}{% set items=items+[("wS",[[v,100]|min,0]|max)] %}{% endif %}
            {% set inner = dict(items) | to_json %}
            {% set outer_env = {"from": node|int(0), "type": "sendtext", "payload": inner, "channel": channel_input|int(0)} %}
            {{ outer_env | to_json }}
      - delay: "{{ range(0, 60) | random }}"
      - service: mqtt.publish
        data:
          qos: 0
          retain: false
          evaluate_payload: false
          topic: "msh/{{ region }}/2/json/mqtt/{{ node }}"
          payload: "{{ envelope }}"
mode: single
