name: Tests & Release

on:
  push:
    branches: [main]
    tags: "v*"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mosquitto:
        image: eclipse-mosquitto
        ports:
          - 1883:1883

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential
      - run: pip install -r tests/requirements.txt
      - name: Build & run config-hub transform tests
        run: make -C config-hub/tests run
      - run: python3 tests/test_mesh.py
      - run: python3 tests/test_schema.py
      - run: python3 tests/test_e2e_mqtt.py
      - name: Validate all YAML files
        run: |
          python3 -c "
          import yaml, pathlib, sys
          yaml.FullLoader.add_constructor(
              '!input', lambda loader, node: node.value
          )
          errors = 0
          for f in sorted(pathlib.Path().rglob('*.yaml')):
              try:
                  yaml.load(f.read_text(), Loader=yaml.FullLoader)
              except yaml.YAMLError as e:
                  print(f'YAML ERROR: {f}: {e}')
                  errors += 1
          if errors:
              sys.exit(1)
          print('All YAML files valid')
          "

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup ESP-IDF
        uses: espressif/esp-idf-cargo-action@v1
      - name: Build firmware
        working-directory: config-hub
        run: |
          idf.py build
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: config-hub/build/lotse_config_hub.bin
          generate_release_notes: true
          make_latest: true
