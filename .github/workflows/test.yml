name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mosquitto:
        image: eclipse-mosquitto
        ports:
          - 1883:1883

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r tests/requirements.txt
      - run: python3 tests/test_mesh.py
      - run: python3 tests/test_schema.py
      - run: python3 tests/test_e2e_mqtt.py
      - name: Validate all YAML files
        run: |
          python3 -c "
          import yaml, pathlib, sys
          # Handle !input YAML tags used by HA blueprints
          yaml.FullLoader.add_constructor(
              '!input', lambda loader, node: node.value
          )
          errors = 0
          for f in sorted(pathlib.Path().rglob('*.yaml')):
              try:
                  yaml.load(f.read_text(), Loader=yaml.FullLoader)
              except yaml.YAMLError as e:
                  print(f'YAML ERROR: {f}: {e}')
                  errors += 1
          if errors:
              sys.exit(1)
          print('All YAML files valid')
          "
