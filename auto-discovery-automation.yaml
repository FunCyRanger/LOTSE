alias: "Mesh: Auto-discover neighbors"
description: "Creates sensors via MQTT discovery for each new mesh node"
trigger:
  - platform: mqtt
    topic: "msh/+/2/json/mqtt/+"
condition:
  - condition: template
    value_template: >
      {{ trigger.payload_json.from is defined
         and trigger.payload_json.payload is defined }}
variables:
  from: "{{ trigger.payload_json.from }}"
  sender: "{{ trigger.topic.split('/')[-1] }}"
  region: "{{ trigger.topic.split('/')[1] }}"
  pp: >
    {% if trigger.payload_json.payload is mapping %}
    {{ trigger.payload_json.payload }}
    {% else %}
    {{ trigger.payload_json.payload | from_json({}) }}
    {% endif %}
action:
  # GRID

  - if:
      - condition: template
        value_template: "{{ pp.gP is defined }}"
    then:
      - service: mqtt.publish
        data:
          qos: 0
          retain: true
          topic: "homeassistant/sensor/mesh_neighbor/{{ from }}-gp/config"
          payload: >
            {"name": "Node {{ from }} gP",
             "state_topic": "msh/{{ region }}/2/json/mqtt/{{ sender }}",
             "value_template": "{% raw %}{% if value_json.from == {% endraw %}{{ from }}{% raw %} %}{% set p = value_json.payload if value_json.payload is mapping else value_json.payload | from_json({}) %}{{ p.gP | float(0) }}{% endif %}{% endraw %}",
             "unit_of_measurement": "kW", "device_class": "power", "state_class": "measurement",
             "unique_id": "mesh_{{ from }}_gp",
             "device": {"identifiers": ["mesh_node_{{ from }}"], "name": "Node {{ from }}", "model": "Heltec V3", "manufacturer": "Meshtastic"}}

  - if:
      - condition: template
        value_template: "{{ pp.gP1 is defined }}"
