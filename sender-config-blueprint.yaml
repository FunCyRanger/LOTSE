blueprint:
  name: LOTSE Mesh — Send Node Registration
  description: >
    Publish your node's system configuration (battery capacity, solar
    peak power, panel orientation) into the LoRa mesh. This runs
    automatically on HA startup and once daily at the configured hour.

    **Required for neighbor combined sensors:** without registration,
    your neighbors can't compute weighted SOC or solar utilization.
  domain: automation
  source_url: >
    https://github.com/FunCyRanger/LOTSE/blob/main/sender-config-blueprint.yaml
  input:
    node_decimal:
      name: Node Number
      description: >
        Your Heltec V3's decimal node number (Meshtastic Web UI > About page)
      selector:
        text:
    region:
      name: LoRa Region
      description: Region code (e.g. EU_868, US_915)
      default: EU_868
      selector:
        text:
    channel:
      name: MQTT Channel
      description: Channel index for the mqtt downlink (0=LongFast, 1=first non-primary)
      default: 1
      selector:
        number:
          min: 0
          max: 7
    config_hour:
      name: Daily Re-registration Hour
      description: Hour of day (0-23) to re-send node registration
      default: 3
      selector:
        number:
          min: 0
          max: 23
    battery_capacity:
      name: Battery Capacity (kWh)
      description: Total battery capacity in kWh (e.g. 10.0)
      default: ""
      selector:
        number:
          min: 0
          max: 1000
          mode: box
          unit_of_measurement: kWh
    solar_peak:
      name: Solar Peak Power (kWp)
      description: Total installed solar peak power in kWp (e.g. 5.0)
      default: ""
      selector:
        number:
          min: 0
          max: 100
          mode: box
          unit_of_measurement: kWp
    panel_angle:
      name: Panel Angle (°)
      description: Solar panel tilt angle from horizontal (0-90)
      default: ""
      selector:
        number:
          min: 0
          max: 90
          mode: box
          unit_of_measurement: "°"
    panel_azimuth:
      name: Panel Azimuth (°)
      description: Solar panel orientation from north (0-360)
      default: ""
      selector:
        number:
          min: 0
          max: 360
          mode: box
          unit_of_measurement: "°"
trigger_variables:
  config_hour: !input config_hour
trigger:
  - platform: homeassistant
    event: start
    id: boot
  - platform: time_pattern
    hours: "/1"
    id: hourly

action:
  - variables:
      node: !input node_decimal
      region: !input region
      channel_input: !input channel
      cap: !input battery_capacity
      pv: !input solar_peak
      ang: !input panel_angle
      az: !input panel_azimuth
  # --- Notification on first boot ---
  - if:
      - condition: template
        value_template: "{{ trigger.id == 'boot' }}"
    then:
      - service: persistent_notification.create
        data:
          title: "LOTSE Mesh — Config Sender Active"
          message: >
            Your LOTSE node registration sender for node **{{ node }}** is active.
            Edit this automation to set your battery capacity, solar peak power,
            and panel orientation so neighbors can see your system specs.
          notification_id: "lotse_config_ready_{{ node }}"
  # --- Config section: on boot or daily at config_hour ---
  - if:
      - condition: template
        value_template: >
          {{ trigger.id == 'boot'
             or (now().hour == (config_hour | int)
                 and now().minute == 0) }}
    then:
      - variables:
          config_payload: >
            {% set items = [] %}
            {% if cap | string != '' %}
              {% set items = items + [("bC", cap | float)] %}
            {% endif %}
            {% if pv | string != '' %}
              {% set items = items + [("sK", pv | float)] %}
            {% endif %}
            {% if ang | string != '' %}
              {% set items = items + [("sA", ang | int)] %}
            {% endif %}
            {% if az | string != '' %}
              {% set items = items + [("sZ", az | int)] %}
            {% endif %}
            {% if items | length > 0 %}
              {% set outer_env = {"from": node|int(0), "type": "sendtext", "payload": dict(items) | to_json, "channel": channel_input|int(0)} %}
              {{ outer_env | to_json }}
            {% endif %}
      - condition: template
        value_template: "{{ config_payload | string != '' }}"
      - delay: "{{ range(0, 60) | random }}"
      - service: mqtt.publish
        data:
          qos: 0
          retain: true
          evaluate_payload: false
          topic: "msh/{{ region }}/2/json/mqtt/{{ node }}"
          payload: "{{ config_payload }}"
      # --- Direct config value publishes (retained, for receiver persistence) ---
      - if:
          - condition: template
            value_template: "{{ cap | string != '' }}"
        then:
          - service: mqtt.publish
            data:
              qos: 0
              retain: true
              evaluate_payload: false
              topic: "lotse/config/{{ node }}/bc"
              payload: "{{ cap | float | round(2) }}"
      - if:
          - condition: template
            value_template: "{{ pv | string != '' }}"
        then:
          - service: mqtt.publish
            data:
              qos: 0
              retain: true
              evaluate_payload: false
              topic: "lotse/config/{{ node }}/sk"
              payload: "{{ pv | float | round(2) }}"
      - if:
          - condition: template
            value_template: "{{ ang | string != '' }}"
        then:
          - service: mqtt.publish
            data:
              qos: 0
              retain: true
              evaluate_payload: false
              topic: "lotse/config/{{ node }}/sa"
              payload: "{{ ang | int }}"
      - if:
          - condition: template
            value_template: "{{ az | string != '' }}"
        then:
          - service: mqtt.publish
            data:
              qos: 0
              retain: true
              evaluate_payload: false
              topic: "lotse/config/{{ node }}/sz"
              payload: "{{ az | int }}"
mode: single
