- sensor:

    # --- Grid Power ---
    - name: "Combined Mesh Grid Power"
      unique_id: "combined_mesh_gp"
      unit_of_measurement: "kW"
      device_class: "power"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_gp$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    - name: "Combined Mesh Grid Import Power"
      unique_id: "combined_mesh_gip"
      unit_of_measurement: "kW"
      device_class: "power"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_gip$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    - name: "Combined Mesh Grid Export Power"
      unique_id: "combined_mesh_gep"
      unit_of_measurement: "kW"
      device_class: "power"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_gep$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    # --- Solar Power ---
    - name: "Combined Mesh Solar Power"
      unique_id: "combined_mesh_sp"
      unit_of_measurement: "kW"
      device_class: "power"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_sp$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    # --- Battery ---
    - name: "Average Neighbor SOC"
      unique_id: "avg_neighbor_soc"
      unit_of_measurement: "%"
      device_class: "battery"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_bs$') | list %}
        {% set vals = entities | map(attribute='state') | map('int', 0) | list %}
        {{ (vals | sum / vals | length) | round(0) if vals | length > 0 else 0 }}

    - name: "Combined Mesh Battery Power"
      unique_id: "combined_mesh_bp"
      unit_of_measurement: "kW"
      device_class: "power"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_bp$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    - name: "Combined Mesh Battery Energy In"
      unique_id: "combined_mesh_bei"
      unit_of_measurement: "kWh"
      device_class: "energy"
      state_class: "total"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_bei$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    - name: "Combined Mesh Battery Energy Out"
      unique_id: "combined_mesh_beo"
      unit_of_measurement: "kWh"
      device_class: "energy"
      state_class: "total"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_beo$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    # --- Grid Cumulative Energy (for Energy Dashboard) ---
    - name: "Combined Mesh Grid Import"
      unique_id: "combined_mesh_gei"
      unit_of_measurement: "kWh"
      device_class: "energy"
      state_class: "total"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_gei$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    - name: "Combined Mesh Grid Export"
      unique_id: "combined_mesh_geo"
      unit_of_measurement: "kWh"
      device_class: "energy"
      state_class: "total"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_geo$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    - name: "Combined Mesh Solar Energy"
      unique_id: "combined_mesh_se"
      unit_of_measurement: "kWh"
      device_class: "energy"
      state_class: "total"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_se$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    # --- Derived neighborhood sensors ---

    - name: "Combined Mesh Total Solar Generation"
      unique_id: "combined_mesh_solar_total"
      unit_of_measurement: "kW"
      device_class: "power"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_sp$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    - name: "Combined Self-Consumption Rate"
      unique_id: "combined_self_consumption"
      unit_of_measurement: "%"
      state_class: "measurement"
      state: >
        {% set solar = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_sp$')
           | map(attribute='state') | map('float', 0) | sum %}
        {% set export = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_gep$')
           | map(attribute='state') | map('float', 0) | sum %}
        {{ [((1 - export / solar) * 100), 0] | max | round(1) if solar > 0 else 0 }}

    - name: "Participating Neighbors"
      unique_id: "combined_mesh_node_count"
      unit_of_measurement: "nodes"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_gip$') | list %}
        {{ entities | length }}

    # --- Config-derived sensors (from bC, sK, sA, sZ) ---

    - name: "Weighted Average SOC"
      unique_id: "weighted_avg_soc"
      unit_of_measurement: "%"
      device_class: "battery"
      state_class: "measurement"
      state: >
        {% set bs_nodes = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_bs$') | list %}
        {% set ns = namespace(weighted_sum=0, total_cap=0) %}
        {% for node in bs_nodes %}
          {% set nid = node.entity_id
             | regex_replace(find='^sensor\\.node_(\\d+)_bs$', replace='\\1', ignorecase=False) %}
          {% set cap = states('sensor.node_' ~ nid ~ '_bc') | float(0) %}
          {% set soc = node.state | int(0) %}
          {% if cap > 0 %}
            {% set ns.weighted_sum = ns.weighted_sum + soc * cap %}
            {% set ns.total_cap = ns.total_cap + cap %}
          {% endif %}
        {% endfor %}
        {% if ns.total_cap > 0 %}
          {{ (ns.weighted_sum / ns.total_cap) | round(0) }}
        {% elif bs_nodes | length > 0 %}
          {{ (bs_nodes | map(attribute='state') | map('int', 0) | sum / bs_nodes | length) | round(0) }}
        {% else %}
          0
        {% endif %}

    - name: "Combined Mesh Battery Capacity"
      unique_id: "combined_mesh_battery_capacity"
      unit_of_measurement: "kWh"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_bc$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(1) }}

    - name: "Combined Mesh Solar Capacity"
      unique_id: "combined_mesh_solar_capacity"
      unit_of_measurement: "kW"
      device_class: "power"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_sk$') | list %}
        {{ entities | map(attribute='state') | map('float', 0) | sum | round(2) }}

    - name: "Combined Solar Utilization"
      unique_id: "combined_solar_utilization"
      unit_of_measurement: "%"
      state_class: "measurement"
      state: >
        {% set sp = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_sp$')
           | map(attribute='state') | map('float', 0) | sum %}
        {% set sk = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_sk$')
           | map(attribute='state') | map('float', 0) | sum %}
        {{ ((sp / sk) * 100) | round(1) if sk > 0 else 0 }}

    - name: "Config-Ready Nodes"
      unique_id: "combined_mesh_config_ready"
      unit_of_measurement: "nodes"
      state_class: "measurement"
      state: >
        {% set entities = expand(states.sensor)
           | selectattr('entity_id', 'search', 'node_\\d+_bc$') | list %}
        {{ entities | length }}

    # --- Forecast.Solar: weighted combined plane ---

    - name: "Combined Solar Panel Angle"
      unique_id: "combined_solar_panel_angle"
      unit_of_measurement: "°"
      state_class: "measurement"
      state: >
        {% set ns = namespace(total_kwp=0, weighted=0) %}
        {% for s in expand(states.sensor) | selectattr('entity_id', 'search', 'node_\\d+_sk$') %}
          {% set kwp = s.state | float(0) %}
          {% if kwp > 0 %}
            {% set nid = s.entity_id
               | regex_replace(find='^sensor\\.node_(\\d+)_sk$', replace='\\1', ignorecase=False) %}
            {% set ang = states('sensor.node_' ~ nid ~ '_sa') | float(0) %}
            {% set ns.weighted = ns.weighted + kwp * ang %}
            {% set ns.total_kwp = ns.total_kwp + kwp %}
          {% endif %}
        {% endfor %}
        {{ (ns.weighted / ns.total_kwp) | round(1) if ns.total_kwp > 0 else 0 }}

    - name: "Combined Solar Panel Azimuth"
      unique_id: "combined_solar_panel_azimuth"
      unit_of_measurement: "°"
      state_class: "measurement"
      state: >
        {% set ns = namespace(total_kwp=0, weighted=0) %}
        {% for s in expand(states.sensor) | selectattr('entity_id', 'search', 'node_\\d+_sk$') %}
          {% set kwp = s.state | float(0) %}
          {% if kwp > 0 %}
            {% set nid = s.entity_id
               | regex_replace(find='^sensor\\.node_(\\d+)_sk$', replace='\\1', ignorecase=False) %}
            {% set az = states('sensor.node_' ~ nid ~ '_sz') | float(0) %}
            {% set ns.weighted = ns.weighted + kwp * az %}
            {% set ns.total_kwp = ns.total_kwp + kwp %}
          {% endif %}
        {% endfor %}
        {{ (ns.weighted / ns.total_kwp) | round(1) if ns.total_kwp > 0 else 0 }}

    - name: "Solar Forecast Utilization"
      unique_id: "solar_forecast_utilization"
      unit_of_measurement: "%"
      state_class: "measurement"
      state: >
        {% set actual = states('sensor.combined_mesh_se') | float(0) %}
        {% set forecast = states('sensor.solar_forecast_today') | float(0) %}
        {{ (actual / forecast * 100) | round(1) if forecast > 0 else 0 }}

# Energy Dashboard solar production sensor.
# Forecast data is provided by the lotse_forecast custom integration (energy.py).
- trigger:
    - platform: state
      entity_id: sensor.combined_mesh_se
  sensor:
    - name: "Solar Production with Forecast"
      unique_id: "solar_production_forecast"
      device_class: "energy"
      state_class: "total"
      unit_of_measurement: "kWh"
      state: >
        {{ states('sensor.combined_mesh_se') | float(0) | round(2) }}

    # --- Improved forecast inputs (EMA-smoothed to prevent jumps) ---

    - name: "Combined Mesh Solar Energy Clean"
      unique_id: "combined_mesh_se_clean"
      unit_of_measurement: "kWh"
      device_class: "energy"
      state_class: "total"
      state: >
        {% set raw = states('sensor.combined_mesh_se') | float(0) %}
        {% set prev = states('sensor.combined_mesh_se_clean') | float(0) %}
        {{ raw if raw >= prev else prev }}

    - name: "Combined Solar Capacity Forecast"
      unique_id: "combined_solar_capacity_forecast"
      unit_of_measurement: "kW"
      device_class: "power"
      state_class: "measurement"
      state: >
        {% set raw = states('sensor.combined_mesh_solar_capacity') | float(0) %}
        {% set prev = states('sensor.combined_solar_capacity_forecast') | float(-1) %}
        {% if prev < 0 %}{% set prev = raw %}{% endif %}
        {{ (prev * 0.9 + raw * 0.1) | round(2) }}

    - name: "Combined Solar Panel Angle Forecast"
      unique_id: "combined_solar_panel_angle_forecast"
      unit_of_measurement: "°"
      state_class: "measurement"
      state: >
        {% set raw = states('sensor.combined_solar_panel_angle') | float(0) %}
        {% set prev = states('sensor.combined_solar_panel_angle_forecast') | float(-1) %}
        {% if prev < 0 %}{% set prev = raw %}{% endif %}
        {{ (prev * 0.9 + raw * 0.1) | round(1) }}

    - name: "Combined Solar Panel Azimuth Forecast"
      unique_id: "combined_solar_panel_azimuth_forecast"
      unit_of_measurement: "°"
      state_class: "measurement"
      state: >
        {% set raw = states('sensor.combined_solar_panel_azimuth') | float(0) %}
        {% set prev = states('sensor.combined_solar_panel_azimuth_forecast') | float(-1) %}
        {% if prev < 0 %}{% set prev = raw %}{% endif %}
        {{ (prev * 0.9 + raw * 0.1) | round(1) }}

    # --- Historical error correction factor ---
    # Computes EMA of (actual_energy / forecast) daily at 23:30.
    # The correction factor sensor re-evaluates whenever combined_mesh_se_clean
    # or solar_forecast_today changes.

    - name: "Forecast Correction Factor"
      unique_id: "forecast_correction_factor"
      state: >
        {% set prev = states('sensor.forecast_correction_factor') | float(1.5) %}
        {% set prev_actual = state_attr('sensor.forecast_correction_factor', 'stored_actual') | float(0) %}
        {% set prev_date = state_attr('sensor.forecast_correction_factor', 'update_date') | default('') %}
        {% set prev_forecast = state_attr('sensor.forecast_correction_factor', 'stored_forecast') | float(1) %}
        {% set today_actual = states('sensor.combined_mesh_se_clean') | float(0) %}
        {% set today_forecast = states('sensor.solar_forecast_today') | float(1) %}
        {% set today_str = now().strftime('%Y-%m-%d') %}
        {% if today_str != prev_date and prev_actual > 0 and prev_forecast > 0 %}
          {% set daily_ratio = (today_actual - prev_actual) / prev_forecast %}
          {% if daily_ratio > 0 and daily_ratio < 3 %}
            {{ (prev * 0.7 + daily_ratio * 0.3) | round(3) }}
          {% else %}
            {{ prev }}
          {% endif %}
        {% else %}
          {{ prev }}
        {% endif %}
      attributes:
        stored_actual: "{{ states('sensor.combined_mesh_se_clean') | float(0) }}"
        stored_forecast: "{{ today_forecast }}"
        update_date: "{{ now().strftime('%Y-%m-%d') }}"

    # --- Solar roughness index (CV of power over rolling 15-min window) ---
    # High value = broken clouds / choppy power; low value = clear / steady.
    # Cross-validated against solarhistory.csv: Pearson r = -0.957 with yield.

    - name: "Solar Roughness Index"
      unique_id: "solar_roughness_index"
      unit_of_measurement: "%"
      state_class: "measurement"
      state: >
        {% set stddev = states('sensor.solar_power_std_dev') | float(0) %}
        {% set mean = states('sensor.solar_power_mean') | float(0) %}
        {% set cap = states('sensor.combined_solar_capacity_forecast') | float(9.3) %}
        {% if mean > 0.05 * cap %}
          {{ ((stddev / mean) * 100) | round(1) }}
        {% else %}
          0
        {% endif %}
