# Default simulation configuration
duration_days: 365
timestep_min: 15
year: 2023

# Neighborhood
n_households: 10
grid_limit_w: 5000  # per-household Phase 1 limit

# Household type mix (fractions must sum to 1.0)
household_mix:
  T1: 0.10  # No PV, fixed tariff
  T2: 0.10  # PV only (EEG)
  T3: 0.10  # PV only (Dynamic)
  T4: 0.15  # PV + Battery
  T5: 0.05  # Battery only
  T6: 0.10  # Heat pump (§14a)
  T7: 0.15  # EV + Wallbox
  T8: 0.10  # Mixed
  T9: 0.10  # Balcony solar
  T10: 0.05  # Balcony solar + Battery

# Fairness approach to test (A through I)
approach: A

# Type-specific defaults
type_defaults:
  T2: {pv_kwp: 7.0, eeg_ct_per_kwh: 8.2, annual_consumption_kwh: 4000}
  T3: {pv_kwp: 7.0, annual_consumption_kwh: 4000}
  T4: {pv_kwp: 10.0, battery_kwh: 10.0, battery_kw: 5.0, annual_consumption_kwh: 4500}
  T5: {battery_kwh: 10.0, battery_kw: 5.0, annual_consumption_kwh: 3500}
  T6: {annual_consumption_kwh: 5000, hp_kw: 3.0, hp_buffer_kwh: 30.0}
  T7: {ev_kwh: 50.0, ev_kw: 11.0, ev_arrival_hour: 17, ev_departure_hour: 8, annual_consumption_kwh: 3500}
  T8: {pv_kwp: 10.0, battery_kwh: 10.0, battery_kw: 5.0, ev_kwh: 50.0, ev_kw: 11.0, hp_kw: 3.0, hp_buffer_kwh: 30.0, annual_consumption_kwh: 5000}
  T9: {pv_kwp: 0.6, annual_consumption_kwh: 3500}
  T10: {pv_kwp: 0.6, battery_kwh: 2.0, battery_kw: 1.0, annual_consumption_kwh: 3500}

# Tariff defaults
tariff_rate_ct_per_kwh: 30.0  # fixed tariff for T1, T2 import
eeg_rate_ct_per_kwh: 8.2      # EEG feed-in for T2

# Grid configuration
transformer_kva: 630
feeder_config:
  n_feeder: 1
  households_per_feeder: [10]
  feeder_length_km: [0.3]

# §14a events
par14a:
  enabled: false
  events_per_year: 5
  max_duration_h: 3
  reduction_kw: 4.2

# Communication model
lora:
  sf: 7
  bandwidth_khz: 125
  duty_cycle_pct: 1.0
